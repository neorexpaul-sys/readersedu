<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>readersedu — 생각을 키우는 공간</title>
<style>
/* ===== CSS Variables (readersedu Design System) ===== */
:root {
  --deep-space: #0a0a1a;
  --navy: #1a237e;
  --navy-light: #283593;
  --amber: #c9a84c;
  --amber-glow: #e8d48b;
  --warm-light: #f5f0e8;
  --math-green: #4ecdc4;
  --error-rose: #e8736a;
  --soft-gold: #d4a853;
  --card-bg: #111133;
  --card-border: rgba(201,168,76,0.15);
  --text-muted: #8890a8;
  --tab-height: 68px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius: 16px;
  --radius-sm: 10px;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--deep-space);
  color: var(--warm-light);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
}
body.modal-open { overflow: hidden; }

/* ===== App Shell ===== */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
}
.screen {
  display: none;
  flex-direction: column;
  flex: 1;
  padding: 20px 20px calc(var(--tab-height) + var(--safe-bottom) + 16px);
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.screen.active { display: flex; }

/* ===== Status Bar ===== */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 20px 0;
  font-size: 0.75rem;
  color: var(--text-muted);
}
.status-bar .pet-emoji { font-size: 1.1rem; }

/* ===== Header ===== */
.app-header {
  padding: 8px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-header h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--amber);
  letter-spacing: -0.02em;
}

/* ===== Bottom Tab Bar ===== */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: calc(var(--tab-height) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(10,10,26,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(201,168,76,0.12);
  display: flex;
  z-index: 100;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  color: var(--text-muted);
  font-size: 0.65rem;
  cursor: pointer;
  transition: color 0.2s;
  border: none;
  background: none;
  font-family: inherit;
  padding: 6px 0;
}
.tab-item .tab-icon { font-size: 1.4rem; }
.tab-item.active { color: var(--amber); }
.tab-item:active { opacity: 0.7; }

/* ===== Cards ===== */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:active { transform: scale(0.985); }
.card-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--amber-glow);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-subtitle {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* ===== Pet Display ===== */
.pet-display {
  text-align: center;
  padding: 24px 0 16px;
}
.pet-egg, .pet-creature {
  font-size: 5rem;
  display: inline-block;
  animation: pet-float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 25px rgba(201,168,76,0.3));
}
@keyframes pet-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.pet-name {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--amber);
  margin-top: 8px;
}
.pet-stage {
  font-size: 0.75rem;
  color: var(--text-muted);
}
.pet-type-label {
  display: inline-block;
  background: rgba(201,168,76,0.15);
  color: var(--amber-glow);
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  margin-top: 6px;
}

/* ===== Evolution Bar ===== */
.evo-bar {
  margin-top: 12px;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  height: 8px;
  overflow: hidden;
}
.evo-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber), #ffb74d);
  border-radius: 10px;
  transition: width 0.6s ease;
}
.evo-stages {
  display: flex;
  justify-content: space-between;
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-top: 4px;
  padding: 0 2px;
}

/* ===== Garden ===== */
.garden-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.garden-plot {
  aspect-ratio: 1;
  background: rgba(255,255,255,0.04);
  border: 1px dashed rgba(201,168,76,0.15);
  border-radius: var(--radius-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.garden-plot:active { background: rgba(201,168,76,0.08); }
.garden-plot .plant-emoji { font-size: 2rem; transition: transform 0.3s; }
.garden-plot .plant-name { font-size: 0.6rem; color: var(--text-muted); text-align: center; }
.garden-plot .plant-stage { font-size: 0.55rem; color: var(--amber); opacity: 0.7; }
.garden-plot.stage-0 .plant-emoji { opacity: 0.3; }
.garden-plot.stage-1 .plant-emoji { opacity: 0.6; }
.garden-plot.stage-2 .plant-emoji { opacity: 0.85; }
.garden-plot.stage-3 .plant-emoji { opacity: 1; filter: drop-shadow(0 0 8px rgba(78,205,196,0.3)); }
.garden-plot.empty .plant-emoji { opacity: 0.2; font-size: 1.2rem; }
.garden-water-btn {
  margin-top: 8px;
  font-size: 0.65rem;
  color: var(--math-green);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 12px;
  background: rgba(78,205,196,0.1);
  border: none;
  font-family: inherit;
}

/* ===== Stats / Abilities ===== */
.ability-list { display: flex; flex-direction: column; gap: 10px; }
.ability-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.ability-icon { font-size: 1.3rem; width: 28px; text-align: center; }
.ability-info { flex: 1; }
.ability-name { font-size: 0.78rem; font-weight: 600; }
.ability-desc { font-size: 0.62rem; color: var(--text-muted); margin-top: 1px; }
.ability-bar-bg {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  margin-top: 4px;
  overflow: hidden;
}
.ability-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.ability-value {
  font-size: 0.75rem;
  font-weight: 700;
  min-width: 30px;
  text-align: right;
  color: var(--amber-glow);
}

/* Radar Chart */
.radar-container {
  display: flex;
  justify-content: center;
  padding: 16px 0;
}
.radar-chart {
  width: 220px;
  height: 220px;
}
.radar-label {
  font-size: 0.58rem;
  fill: var(--text-muted);
  text-anchor: middle;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: 25px;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: inherit;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, var(--amber), #b8860b);
  color: #1a1a1a;
  box-shadow: 0 4px 20px rgba(201,168,76,0.25);
}
.btn-secondary {
  background: rgba(201,168,76,0.1);
  color: var(--amber);
  border: 1px solid rgba(201,168,76,0.2);
}
.btn-small {
  padding: 8px 16px;
  font-size: 0.78rem;
  border-radius: 20px;
  width: auto;
}
.btn-voice {
  width: auto;
  padding: 6px 14px;
  font-size: 0.75rem;
  border-radius: 18px;
  background: rgba(78,205,196,0.1);
  color: var(--math-green);
  border: 1px solid rgba(78,205,196,0.2);
}

/* ===== Onboarding ===== */
.onboarding-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  text-align: center;
  padding: 30px 20px;
  gap: 20px;
}
.onboarding-emoji { font-size: 4rem; animation: pet-float 3s ease-in-out infinite; }
.onboarding-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.5rem;
  color: var(--amber);
  line-height: 1.4;
}
.onboarding-text {
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.6;
  max-width: 320px;
}
.diagnostic-question {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 20px;
  width: 100%;
  text-align: left;
}
.diagnostic-question .q-num {
  font-size: 0.7rem;
  color: var(--amber);
  margin-bottom: 8px;
}
.diagnostic-question .q-text {
  font-size: 0.9rem;
  margin-bottom: 14px;
  line-height: 1.5;
}
.option-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 12px 14px;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--warm-light);
  font-size: 0.8rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.option-btn:hover, .option-btn:active { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.3); }
.option-btn.selected { background: rgba(201,168,76,0.15); border-color: var(--amber); }

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal-content {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 360px;
  width: 100%;
  text-align: center;
}
.modal-content h3 { color: var(--amber); margin-bottom: 12px; font-size: 1.1rem; }
.modal-content p { color: var(--text-muted); font-size: 0.82rem; line-height: 1.6; margin-bottom: 14px; }

/* ===== Activity Feed ===== */
.activity-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 0.78rem;
}
.activity-emoji { font-size: 1.2rem; }
.activity-time { font-size: 0.65rem; color: var(--text-muted); margin-left: auto; }
.activity-xp { color: var(--amber); font-weight: 600; font-size: 0.7rem; }

/* ===== Problem Modal ===== */
.problem-text {
  font-size: 1.1rem;
  background: rgba(255,255,255,0.05);
  padding: 16px;
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
  line-height: 1.6;
}
.answer-input {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06);
  color: var(--warm-light);
  font-size: 1rem;
  font-family: inherit;
  text-align: center;
  margin-bottom: 12px;
}
.answer-input:focus { outline: none; border-color: var(--amber); }
.feedback-positive { color: var(--math-green); font-weight: 600; }
.feedback-growth { color: var(--amber-glow); font-weight: 600; }

/* ===== Animations ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes glow-pulse {
  0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,0.2); }
  50% { box-shadow: 0 0 40px rgba(201,168,76,0.4); }
}
@keyframes sprout {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.animate-in { animation: fadeInUp 0.4s ease-out; }
.glow { animation: glow-pulse 2s ease-in-out infinite; }
.sprout-anim { animation: sprout 0.5s ease-out; }

/* ===== Voice Indicator ===== */
.voice-indicator {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(78,205,196,0.2);
  border: 2px solid var(--math-green);
  z-index: 300;
  animation: glow-pulse 1s ease-in-out infinite;
}
.voice-indicator.active { display: block; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 3px; }

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card-bg);
  border: 1px solid var(--amber);
  color: var(--amber-glow);
  padding: 10px 20px;
  border-radius: 25px;
  font-size: 0.8rem;
  z-index: 400;
  animation: fadeInUp 0.3s ease-out;
  white-space: nowrap;
}
</style>
</head>
<body>

<div id="app">
  <!-- Status Bar -->
  <div class="status-bar">
    <span id="statusLeft">🌙 생각 정원</span>
    <span id="statusRight" class="pet-emoji"></span>
  </div>

  <!-- ============ SCREEN: Onboarding ============ -->
  <div id="screenOnboarding" class="screen active">
    <div class="onboarding-container" id="onboardingContent"></div>
  </div>

  <!-- ============ SCREEN: Dashboard ============ -->
  <div id="screenDashboard" class="screen">
    <div class="app-header"><h1>🌱 내 생각 정원</h1></div>
    <div id="dashboardContent"></div>
  </div>

  <!-- ============ SCREEN: Garden ============ -->
  <div id="screenGarden" class="screen">
    <div class="app-header"><h1>🏡 생각 정원</h1></div>
    <div id="gardenContent"></div>
  </div>

  <!-- ============ SCREEN: Pet ============ -->
  <div id="screenPet" class="screen">
    <div class="app-header"><h1>🐾 사고 펫</h1></div>
    <div id="petContent"></div>
  </div>

  <!-- ============ SCREEN: Stats ============ -->
  <div id="screenStats" class="screen">
    <div class="app-header"><h1>📊 능력치</h1></div>
    <div id="statsContent"></div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar" id="tabBar" style="display:none;">
    <button class="tab-item active" data-screen="dashboard">
      <span class="tab-icon">🏠</span>홈
    </button>
    <button class="tab-item" data-screen="garden">
      <span class="tab-icon">🏡</span>정원
    </button>
    <button class="tab-item" data-screen="pet">
      <span class="tab-icon">🐾</span>펫
    </button>
    <button class="tab-item" data-screen="stats">
      <span class="tab-icon">📊</span>능력치
    </button>
  </nav>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <!-- Voice Indicator -->
  <div class="voice-indicator" id="voiceIndicator">🎤</div>
</div>

<script>
// ============================================================
// readersedu.app MVP — Complete Game Engine
// ============================================================

// ===== CONSTANTS =====
const PET_TYPES = {
  logical:    { name: '논리형',   emoji: '🦉', label: '지혜의 올빼미', color: '#5c6bc0', desc: '차근차근 논리를 쌓아가는 당신! 마치 올빼미처럼 깊이 생각하고 분석하는 스타일이에요. 복잡한 문제도 하나씩 뜯어보면 정답이 보이죠.' },
  intuitive:  { name: '직관형',   emoji: '🦊', label: '통찰의 여우',   color: '#ef6c00', desc: '번뜩이는 감으로 정답에 가까이 가는 당신! 여우처럼 재빠르게 패턴을 발견하고, 직관으로 길을 찾는 스타일이에요.' },
  persistent: { name: '끈기형',   emoji: '🐢', label: '인내의 거북이', color: '#43a047', desc: '포기하지 않고 끝까지 해내는 당신! 거북이처럼 느리지만 꾸준히, 어떤 어려운 문제도 결국 해결하는 스타일이에요.' },
  creative:   { name: '창의형',   emoji: '🦎', label: '상상의 카멜레온', color: '#ab47bc', desc: '남들과 다른 방법으로 생각하는 당신! 카멜레온처럼 상황에 맞춰 생각을 변화시키고, 창의적인 풀이를 찾아내는 스타일이에요.' },
  collaborative:{ name: '협력형', emoji: '🐬', label: '공감의 돌고래', color: '#29b6f6', desc: '함께할 때 가장 빛나는 당신! 돌고래처럼 다른 사람의 생각을 잘 이해하고, 협력해서 더 나은 답을 찾아내는 스타일이에요.' }
};

const EVO_STAGES = ['알', '새끼', '성체', '전설'];
const EVO_STAGE_EMOJIS = { 0: '🥚', 1: '🐣', 2: '🐥', 3: '✨' };
const EVO_XP_THRESHOLDS = [0, 100, 300, 600]; // XP needed to reach each stage

const GARDEN_PLANTS = [
  { id: 'quadratic', name: '이차함수', emoji: '📈', stages: ['🌰','🌱','🌿','🌳'], xpPerWater: 8 },
  { id: 'geometry',  name: '도형의 성질', emoji: '🔷', stages: ['🌰','🌱','🌿','💎'], xpPerWater: 10 },
  { id: 'equation',  name: '방정식',   emoji: '⚖️', stages: ['🌰','🌱','🌿','🏛️'], xpPerWater: 8 },
  { id: 'function',  name: '함수',     emoji: '📊', stages: ['🌰','🌱','🌿','🌲'], xpPerWater: 9 },
  { id: 'stats',     name: '확률과 통계',emoji: '🎲', stages: ['🌰','🌱','🌿','🎯'], xpPerWater: 7 },
  { id: 'sequence',  name: '수열',     emoji: '🔢', stages: ['🌰','🌱','🌿','🏗️'], xpPerWater: 8 },
];

const ABILITIES = [
  { key: 'analysis',      icon: '🧠', name: '분석력', desc: '문제를 단계별로 분해하는 힘', color: '#5c6bc0' },
  { key: 'intuition',     icon: '👁️', name: '직관력', desc: '패턴을 빠르게 간파하는 힘', color: '#ef6c00' },
  { key: 'persistence',   icon: '💪', name: '끈기',   desc: '어려운 문제에 도전하는 힘', color: '#43a047' },
  { key: 'creativity',    icon: '🎨', name: '창의력', desc: '새로운 풀이 방법을 찾는 힘', color: '#ab47bc' },
  { key: 'explanation',   icon: '🗣️', name: '설명력', desc: '자신의 생각을 표현하는 힘', color: '#29b6f6' },
  { key: 'recovery',      icon: '🛡️', name: '회복력', desc: '실패에서 배우고 다시 도전하는 힘', color: '#e8736a' },

// ===== PERSISTENCE =====
function loadState() {
  try {
    const raw = localStorage.getItem('readersedu_state');
    if (raw) {
      const saved = JSON.parse(raw);
      // merge with defaults to handle new fields
      return deepMerge(DEFAULT_STATE, saved);
    }
  } catch (e) { console.warn('State load failed:', e); }
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

function saveState() {
  try {
    localStorage.setItem('readersedu_state', JSON.stringify(state));
  } catch (e) { console.warn('State save failed:', e); }
}

function deepMerge(defaults, saved) {
  const result = JSON.parse(JSON.stringify(defaults));
  for (const key of Object.keys(saved)) {
    if (key in result) {
      if (typeof result[key] === 'object' && result[key] !== null && !Array.isArray(result[key])) {
        result[key] = deepMerge(result[key], saved[key]);
      } else {
        result[key] = saved[key];
      }
    }
  }
  return result;
}

function resetState() {
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  saveState();
  location.reload();
}

// ===== SCREEN NAVIGATION =====
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + name.charAt(0).toUpperCase() + name.slice(1))?.classList.add('active');
  document.getElementById('tabBar').style.display = name === 'onboarding' ? 'none' : 'flex';

  if (name !== 'onboarding') {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    const tab = document.querySelector(`.tab-item[data-screen="${name}"]`);
    if (tab) tab.classList.add('active');
  }

  currentScreen = name;
  renderScreen(name);
}

function renderScreen(name) {
  switch (name) {
    case 'onboarding': renderOnboarding(); break;
    case 'dashboard': renderDashboard(); break;
    case 'garden': renderGarden(); break;
    case 'pet': renderPet(); break;
    case 'stats': renderStats(); break;
  }
  updateStatusBar();
}

  const left = document.getElementById('statusLeft');

  left.textContent = state.pet.type ? `🌙 ${state.pet.name || '사고 펫'}` : '🌙 생각 정원';

function advanceOnboarding() {
  state.user.onboardingStep++;
  saveState();
  renderOnboarding();
}

function setNameAndAdvance() {
  const input = document.getElementById('onboardName');
  const name = input?.value?.trim();
  if (!name) { input?.focus(); return; }
  state.user.name = name;
  saveState();
  advanceOnboarding();
}

function selectDiagnosticOption(btn, value, qIndex) {
  document.querySelectorAll('#optionsContainer .option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.user.diagnosticAnswers[qIndex] = value;
  window._diagSelected = true;
  const nextBtn = document.getElementById('diagNextBtn');
  if (nextBtn) { nextBtn.disabled = false; nextBtn.style.opacity = '1'; }
  saveState();
}

function determineThinkingStyle() {
  const answers = state.user.diagnosticAnswers;
  const counts = {};
  answers.forEach(a => { counts[a] = (counts[a] || 0) + 1; });
  // Pick the most common style, with tiebreaker
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  // In case of 1-1-1 tie, pick logical as default
  state.user.thinkingStyle = sorted[0][0];
  state.pet.type = state.user.thinkingStyle;
  saveState();
}

function finalizeOnboarding() {
  const input = document.getElementById('petNameInput');
  const name = input?.value?.trim();
  if (!name) { input?.focus(); return; }
  state.pet.name = name;
  state.user.onboardingComplete = true;
  state.user.onboardingStep = 99;
  saveState();
  speakText(`${name}야, 만나서 반가워! 함께 생각을 키워보자!`);
  showScreen('dashboard');
  addActivity('🎉', `${state.user.name}님이 readersedu에 합류했어요! ${PET_TYPES[state.pet.type].name} 펫 '${name}'(이)가 탄생했습니다!`);
}

// ===== DAILY PROBLEM =====
function submitDailyAnswer() {
  const input = document.getElementById('dailyAnswer');
  const feedback = document.getElementById('dailyFeedback');
  if (!input || !currentProblem) return;

  const userAnswer = input.value.trim();
  state.stats.problemsAttempted++;
  state.stats.lastProblemDate = getDateKey();

  if (userAnswer === currentProblem.answer) {
    state.stats.problemsSolved++;
    const xpGain = 25;
    state.pet.xp += xpGain;
    state.abilities.analysis = Math.min(100, state.abilities.analysis + 3);
    state.abilities.intuition = Math.min(100, state.abilities.intuition + 1);
    addActivity('✅', `오늘의 문제 해결! "${currentProblem.text}" → ${currentProblem.answer}`, { xp: xpGain, problemId: currentProblem.id });
    feedback.innerHTML = '<div class="feedback-positive">🎉 정답이에요! 훌륭해요! +25XP</div>';
    speakText('정답이에요! 정말 훌륭해요!');
    // Water a relevant garden plant
    waterGardenPlant(currentProblem.type);
    checkEvolution();
    currentProblem = null;
    saveState();
    setTimeout(() => renderDashboard(), 1500);
  } else {
    state.abilities.recovery = Math.min(100, state.abilities.recovery + 2);
    state.abilities.persistence = Math.min(100, state.abilities.persistence + 1);
    state.pet.xp += 5; // XP for trying
    addActivity('💡', `오늘의 문제 도전! "${currentProblem.text}" → 정답은 ${currentProblem.answer}`, { xp: 5, problemId: currentProblem.id });
    feedback.innerHTML = `<div class="feedback-growth">🌱 조금 더 생각해볼까요? 힌트: ${currentProblem.hint}<br>틀려도 괜찮아요! 실패 경험치 +5XP</div>`;
    speakText('틀려도 괜찮아요! 다시 생각해볼까요?');
    addFertilizer();
    saveState();
  }
}

function waterGardenPlant(type) {
  const mapping = { equation: 0, geometry: 1, sequence: 5, function: 3, exponent: 3, number: 0, arithmetic: 5 };
  const plantIdx = mapping[type] || Math.floor(Math.random() * state.garden.length);
  const plant = state.garden[plantIdx];
  if (!plant) return;
  plant.water++;
  const plantInfo = GARDEN_PLANTS[plantIdx];
  const newStage = Math.min(3, Math.floor(plant.water / 3));
  if (newStage > plant.stage) {
    plant.stage = newStage;
    showToast(`🌱 ${plantInfo.name}이(가) ${['싹이 텄어요!','자라고 있어요!','꽃이 피었어요!','열매가 열렸어요!'][newStage-1]}`);
  }
  saveState();
}

function waterRandomPlant() {
  const idx = Math.floor(Math.random() * state.garden.length);
  const plant = state.garden[idx];
  plant.water++;
  state.pet.xp += 3;
  state.abilities.persistence = Math.min(100, state.abilities.persistence + 1);
  const plantInfo = GARDEN_PLANTS[idx];
  const newStage = Math.min(3, Math.floor(plant.water / 3));
  if (newStage > plant.stage) {
    plant.stage = newStage;
    showToast(`🌱 ${plantInfo.name}이(가) ${['싹이 텄어요!','자라고 있어요!','꽃이 피었어요!','열매가 열렸어요!'][newStage-1]}`);
    addActivity('🌱', `${plantInfo.name}이(가) 성장했어요! (${['싹','성장','꽃','열매'][newStage-1]})`, { xp: 5 });
  } else {
    addActivity('💧', `${plantInfo.name}에 물을 줬어요`, { xp: 3 });
  }
  checkEvolution();
  saveState();
  renderDashboard();
  speakText(`${plantInfo.name}에 물을 줬어요. 쑥쑥 자라라!`);
}

function addFertilizer() {
  state.garden.forEach(p => { p.fertilizer = (p.fertilizer || 0) + 0.3; });
  saveState();
}

  state.pet.xp += 15;

// ===== EVOLUTION =====
function checkEvolution() {
  for (let stage = 3; stage > state.pet.stage; stage--) {
    if (state.pet.xp >= EVO_XP_THRESHOLDS[stage] && state.pet.stage < stage) {
      const oldStage = state.pet.stage;
      state.pet.stage = stage;
      addActivity('🦋', `${state.pet.name}이(가) 진화했습니다! ${EVO_STAGES[oldStage]} → ${EVO_STAGES[stage]}`, { xp: 0 });
      showToast(`🦋 ${state.pet.name}이(가) ${EVO_STAGES[stage]}로 진화했어요!`);
      speakText(`${state.pet.name}이 진화했어요! 이제 ${EVO_STAGES[stage]} 단계예요!`);
      break;
    }
  }
}

// ===== UTILITY =====
function getDateKey() {
  return new Date().toISOString().split('T')[0];
}

function checkStreak() {
  const today = getDateKey();
  const last = state.stats.lastSessionDate;
  if (!last) {
    state.stats.streak = 1;
  } else if (last === today) {
    // Already logged today
  } else {
    const lastDate = new Date(last);
    const todayDate = new Date(today);
    const diff = Math.floor((todayDate - lastDate) / (1000 * 60 * 60 * 24));
    if (diff === 1) {
      state.stats.streak++;
    } else if (diff > 1) {
      // Streak broken — but we give a recovery chance
      if (diff <= 3 && state.abilities.recovery > 30) {
        // Recovery prevents streak break
        addActivity('🛡️', `회복력으로 ${diff-1}일 공백을 극복했어요! 연속 기록 유지!`);
      } else {
        state.stats.streak = 1;
      }
    }
  }
  state.stats.lastSessionDate = today;
  saveState();
}

function addActivity(emoji, text, opts = {}) {
  if (!state.stats.activityLog) state.stats.activityLog = [];
  const now = new Date();
  state.stats.activityLog.push({
    emoji,
    text,
    xp: opts.xp || 0,
    problemId: opts.problemId,
    time: `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`,
    date: getDateKey(),
  });
  // Keep last 100
  if (state.stats.activityLog.length > 100) {
    state.stats.activityLog = state.stats.activityLog.slice(-100);
  }
  saveState();
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

function openModal(html) {
  const modal = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = html;
  modal.classList.add('active');
  document.body.classList.add('modal-open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.classList.remove('modal-open');
}

document.getElementById('modalOverlay')?.addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===== VOICE TTS =====
function speakText(text) {
  if (!state.settings.voiceEnabled) return;
  try {
    if (!speechSynth) speechSynth = window.speechSynthesis;
    speechSynth.cancel(); // Stop any ongoing speech
    const utterance = new SpeechSynthesisUtterance(text);

    // Try to find Korean voice
    const voices = speechSynth.getVoices();
    const koreanVoice = voices.find(v => v.lang.startsWith('ko')) ||
                        voices.find(v => v.lang === 'ko-KR');
    if (koreanVoice) utterance.voice = koreanVoice;

    utterance.lang = 'ko-KR';
    utterance.rate = 1.0;
    utterance.pitch = 1.1;
    utterance.volume = 0.8;

    speechSynth.speak(utterance);
  } catch (e) {
    console.warn('TTS failed:', e);
  }
}

// Preload voices
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
  };
}
